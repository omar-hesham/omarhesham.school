# ============================================================
# omarhesham.school — Nginx Server Configuration
# Paste this into Forge → Site → Nginx Configuration
# ============================================================

server {
    listen 443 ssl;
    server_name omarhesham.school www.omarhesham.school;
    root /home/forge/omarhesham.school/current/public;

    index index.php;

    charset utf-8;

    # ── Compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Upload size (must match PLATFORM_UPLOAD_MAX_MB + 1) ─
    client_max_body_size 21M;

    # ── Security headers (belt-and-suspenders with PHP middleware) ─
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # ── Block direct access to private storage ───────────────
    location ^~ /storage/uploads {
        deny all;
        return 403;
    }

    # ── Main routing ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # ── PHP-FPM ──────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 120;
        fastcgi_hide_header X-Powered-By;
    }

    # ── Block hidden files except .well-known ────────────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # ── SSL ──────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/omarhesham.school/server.crt;
    ssl_certificate_key /etc/nginx/ssl/omarhesham.school/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/omarhesham.school-access.log;
    error_log  /var/log/nginx/omarhesham.school-error.log;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    server_name omarhesham.school www.omarhesham.school;
    return 301 https://omarhesham.school$request_uri;
}

# ── www → non-www redirect ───────────────────────────────────
server {
    listen 443 ssl;
    server_name www.omarhesham.school;
    ssl_certificate     /etc/nginx/ssl/omarhesham.school/server.crt;
    ssl_certificate_key /etc/nginx/ssl/omarhesham.school/server.key;
    return 301 https://omarhesham.school$request_uri;
}
